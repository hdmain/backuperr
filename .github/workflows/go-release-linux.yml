name: Go Release (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # opcjonalnie, do ręcznego uruchamiania

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/client ./cmd/client
          GOOS=linux GOARCH=amd64 go build -o dist/host ./cmd/host

      - name: Check files (DEBUG)
        run: ls -lah dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          